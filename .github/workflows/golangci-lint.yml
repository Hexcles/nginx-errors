name: golangci-lint
on:
  push:
    tags:
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26
      - uses: actions/checkout@v6
      - uses: golangci/golangci-lint-action@v9
